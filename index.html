<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インフォキュレーター</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-faint: #aaaaaa;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-text: #3C3489;
    --teal-light: #E1F5EE;
    --teal-text: #085041;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 50; }
  .header-left { display: flex; align-items: center; gap: 1rem; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .tabs { display: flex; gap: 2px; }
  .tab { padding: 5px 12px; border-radius: var(--radius-sm); border: none; background: transparent; font-size: 13px; color: var(--text-muted); cursor: pointer; }
  .tab.active { background: var(--purple-light); color: var(--purple-text); font-weight: 500; }
  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; }
  .search-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
  .btn { padding: 7px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; color: var(--text); cursor: pointer; white-space: nowrap; }
  .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .filter-tag { padding: 4px 12px; border-radius: 99px; font-size: 12px; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-muted); }
  .filter-tag.active { background: var(--purple-light); color: var(--purple-text); border-color: #AFA9EC; font-weight: 500; }
  .cards { display: grid; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 3px; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--purple); text-decoration: underline; }
  .card-source { font-size: 11px; color: var(--text-faint); margin-bottom: 6px; }
  .card-summary { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .ctag { padding: 2px 8px; border-radius: 99px; font-size: 11px; background: var(--purple-light); color: var(--purple-text); }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .abtn { padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: transparent; font-size: 12px; color: var(--text-muted); cursor: pointer; }
  .badge { display: inline-flex; padding: 2px 7px; border-radius: 99px; font-size: 11px; margin-left: 5px; background: var(--teal-light); color: var(--teal-text); }
  .loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 13px; }
  .empty { text-align: center; padding: 3rem; color: var(--text-faint); font-size: 13px; }
  .act-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .act-row:last-child { border-bottom: none; }
  .act-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; background: var(--purple-light); color: var(--purple-text); }
  .act-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .act-text strong { color: var(--text); font-weight: 500; }
  .act-time { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: min(460px, 90vw); border: 1px solid var(--border); }
  .modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; color: var(--text); background: var(--surface); outline: none; }
  .field textarea { resize: vertical; min-height: 60px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
  .hint { font-size: 12px; color: var(--text-faint); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .slabel { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">インフォキュレーター</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('feed', this)">フィード</button>
      <button class="tab" onclick="switchTab('team', this)">チーム動向</button>
    </div>
  </div>
  <div>
    <button class="btn primary" onclick="document.getElementById('add-modal').classList.add('open')">+ URLを追加</button>
  </div>
</div>

<div class="main">
  <div id="tab-feed" class="tab-content active">
    <div class="toolbar">
  <input type="text" class="search-input" id="search-input" placeholder="キーワードで検索..." oninput="filterCards()">
</div>
<div class="toolbar" style="margin-bottom:1.25rem;">
  <input type="text" class="search-input" id="theme-input" placeholder="調べたいテーマを入力... 例：コミュニティマーケティング">
  <button class="btn primary" onclick="searchTheme()">AIで調べる</button>
</div>
    <div class="tag-row" id="tag-row">
      <span class="filter-tag active" onclick="setTag(this,'all')">すべて</span>
    </div>
    <div class="cards" id="cards-container">
      <div class="loading">記事を読み込み中...</div>
    </div>
  </div>
  <div id="tab-team" class="tab-content">
    <div class="slabel">最近の更新</div>
    <div id="team-list"></div>
  </div>
</div>

<div class="modal-bg" id="add-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h2>記事を追加</h2>
    <div class="field">
      <label>URL</label>
      <input type="text" id="new-url" placeholder="https://...">
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <textarea id="new-memo" placeholder="気になったポイントなど"></textarea>
    </div>
    <p class="hint">AIが自動で要約・タグ付けします。</p>
    <div class="modal-footer">
      <button class="btn" onclick="document.getElementById('add-modal').classList.remove('open')">キャンセル</button>
      <button class="btn primary" onclick="submitURL()">追加する</button>
    </div>
  </div>
</div>

<script>
var PROXY_URL = 'https://notion-proxy.k-tochizawa.workers.dev';
var DATABASE_ID = '343c33c4017580a29d21eb6295e46afd';
var WEBHOOK_URL = 'https://hook.eu1.make.com/mk99ql3p2od7cvvwyk8mypawmrmii91f';
var allArticles = [];
var activeTag = 'all';

function searchTheme() {
  var theme = document.getElementById('theme-input').value.trim();
  if (!theme) { alert('テーマを入力してください'); return; }
  fetch('https://hook.eu1.make.com/l7xg631e6r2c65gjidpl7x2vjtu5clr8?theme=' + encodeURIComponent(theme))
  .then(function() {
    document.getElementById('theme-input').value = '';
    alert('調査を開始しました！1〜2分後にページを更新すると結果が表示されます。');
  })
  .catch(function() { alert('送信に失敗しました。'); });
}

fetchArticles();

function fetchArticles() {
  fetch(PROXY_URL + '/v1/databases/' + DATABASE_ID + '/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sorts: [{ timestamp: 'created_time', direction: 'descending' }] })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    allArticles = data.results.map(function(page) {
      var titleArr = page.properties['記事タイトル'] && page.properties['記事タイトル'].title;
      var summaryArr = page.properties['summary'] && page.properties['summary'].rich_text;
      var tagsArr = page.properties['タグ'] && page.properties['タグ'].multi_select;
      return {
        id: page.id,
        title: (titleArr && titleArr[0]) ? titleArr[0].text.content : 'タイトルなし',
        url: (page.properties['URL'] && page.properties['URL'].url) ? page.properties['URL'].url : '',
        summary: (summaryArr && summaryArr[0]) ? summaryArr[0].text.content : '',
        tags: tagsArr ? tagsArr.map(function(t) { return t.name; }) : [],
        date: page.created_time
      };
    });
    renderTagRow();
    filterCards();
    renderTeam();
  })
  .catch(function(e) {
    document.getElementById('cards-container').innerHTML = '<div class="empty">読み込みに失敗しました: ' + e.message + '</div>';
  });
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return ''; }
}

function timeAgo(dateStr) {
  var diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return Math.floor(diff/60) + '分前';
  if (diff < 86400) return Math.floor(diff/3600) + '時間前';
  return Math.floor(diff/86400) + '日前';
}

function renderCards(list) {
  var c = document.getElementById('cards-container');
  if (!list.length) { c.innerHTML = '<div class="empty">該当する記事がありません</div>'; return; }
  c.innerHTML = list.map(function(a) {
    return '<div class="card">' +
      '<div class="card-title"><a href="' + a.url + '" target="_blank">' + a.title + '</a><span class="badge">AI</span></div>' +
      '<div class="card-source">' + getDomain(a.url) + ' · ' + timeAgo(a.date) + '</div>' +
      (a.summary ? '<div class="card-summary">' + a.summary + '</div>' : '') +
      (a.tags.length ? '<div class="card-tags">' + a.tags.map(function(t) { return '<span class="ctag">' + t + '</span>'; }).join('') + '</div>' : '') +
      '<div class="card-footer"><button class="abtn" onclick="window.open(\'' + a.url + '\',\'_blank\')">元記事を開く</button></div>' +
      '</div>';
  }).join('');
}

function filterCards() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var list = allArticles;
  if (activeTag !== 'all') list = list.filter(function(a) { return a.tags.indexOf(activeTag) !== -1; });
  if (q) list = list.filter(function(a) { return a.title.toLowerCase().indexOf(q) !== -1 || a.summary.toLowerCase().indexOf(q) !== -1; });
  renderCards(list);
}

function renderTagRow() {
  var tags = ['all'];
  allArticles.forEach(function(a) {
    a.tags.forEach(function(t) { if (tags.indexOf(t) === -1) tags.push(t); });
  });
  document.getElementById('tag-row').innerHTML = tags.map(function(t) {
    return '<span class="filter-tag' + (t === activeTag ? ' active' : '') + '" onclick="setTag(this,\'' + t + '\')">' + (t === 'all' ? 'すべて' : t) + '</span>';
  }).join('');
}

function setTag(el, t) {
  activeTag = t;
  renderTagRow();
  filterCards();
}

function renderTeam() {
  document.getElementById('team-list').innerHTML = allArticles.slice(0, 10).map(function(a) {
    return '<div class="act-row"><div class="act-av">新</div><div><div class="act-text">新しい記事が追加されました：<strong>' + a.title + '</strong></div><div class="act-time">' + timeAgo(a.date) + '</div></div></div>';
  }).join('');
}

function submitURL() {
  var url = document.getElementById('new-url').value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  fetch(WEBHOOK_URL + '?url=' + encodeURIComponent(url))
  .then(function() {
    document.getElementById('add-modal').classList.remove('open');
    document.getElementById('new-url').value = '';
    document.getElementById('new-memo').value = '';
    alert('送信しました！しばらく後にページを更新すると記事が追加されます。');
  })
  .catch(function() { alert('送信に失敗しました。'); });
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

fetchArticles();
</script>
</body>
</html>
